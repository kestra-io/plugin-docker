id: docker_run_commands_no_defaults
namespace: company.team

inputs:
  - id: image
    type: STRING
    required: true
  - id: commands
    type: ARRAY
    itemType: STRING
    required: false

tasks:
  - id: run
    type: io.kestra.plugin.docker.Run
    containerImage: "{{ inputs.image }}"
    commands: "{{ inputs.commands | default([]) }}"
